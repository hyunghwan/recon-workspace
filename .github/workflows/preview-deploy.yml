name: Preview Deploy

on:
  workflow_dispatch:

jobs:
  preview:
    runs-on: ubuntu-latest
    env:
      SITE_ORIGIN: https://your-firebase-project-id.web.app
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run release verification
        run: pnpm release:verify

      - name: Deploy preview channel
        run: npx -y firebase-tools@latest hosting:channel:deploy preprod --project your-firebase-project-id --token "$FIREBASE_TOKEN"

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preview-evidence
          path: .sisyphus/evidence
          if-no-files-found: warn
